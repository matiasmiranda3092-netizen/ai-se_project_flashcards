<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Matias Miranda" />
    <meta
      name="description"
      content="A learning app to show you the basics of the coding world"
    />
    <meta
      name="keywords"
      content="study aids, flashcards, learning material, educational resources, practice"
    />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />

    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <title>Beginner Developer Code Cards</title>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="./index.html" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="./index.html" class="nav__link">My Decks</a></li>
          <li><a href="./index.html" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content_location_carousel">
      <section id="carousel" class="carousel">
        <h2 class="carousel__title">HTML Tags Deck &middot;1/10</h2>
        <div class="carousel__row">
          <button
            type="button"
            aria-label="Go to previous card"
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
          ></button>
          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>
          <button
            type="button"
            aria-label="Go to previous card"
            class="carousel__btn carousel__btn_type_right"
          ></button>
        </div>
        <button
          type="button"
          class="carousel__btn carousel__btn_type_flip"
          aria-label="Flip card"
        ></button>
      </section>
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <div class="gallery-wrapper">
          <ul class="gallery__list"></ul>
          <template id="card-template">
            <li class="card card_color_green">
              <a class="card__link" href="#"></a>
              <h3 class="card__title"></h3>
              <div class="card__row">
                <p class="card__count"></p>
                <button
                  type="button"
                  class="card__btn card__btn_type_delete"
                  aria-label="Delete this card"
                ></button>
              </div>
            </li>
          </template>
          <template id="deck-card-template">
            <li class="card">
              <h3 class="card__title"></h3>
              <div class="card__row">
                <button
                  class="card__btn card__btn_type_flip"
                  type="button"
                  aria-label="Flip card"
                ></button>
                <button
                  type="button"
                  aria-label="Delete card"
                  class="card__btn card__btn_type_delete"
                ></button>
              </div>
            </li>
          </template>
          <button type="button" class="gallery__new-card-btn">+New Deck</button>
        </div>
      </section>
      <section id="deck-view" class="gallery">
        <div class="gallery__header">
          <h2 class="gallery__title"></h2>
          <button type="button" class="gallery__practice-btn">Practice</button>
        </div>
        <div class="wrapping-row">
          <ul class="gallery__list wrapping-row__display-contents"></ul>
          <button type="button" class="gallery__new-card-btn">
            + New Card
          </button>
        </div>
      </section>
      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Matias Miranda</p>
    </footer>
    <script src="./assets/js/index.js" type="module"></script>
  </body>
</html>
